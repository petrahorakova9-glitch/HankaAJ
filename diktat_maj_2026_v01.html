<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktívne Diktáty 6. ročník</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.8; max-width: 900px; margin: 20px auto; padding: 0 20px; background-color: #f0f2f5; color: #333; }
        h1 { text-align: center; color: #1a2a6c; margin-bottom: 30px; }
        .tabs { display: flex; flex-wrap: wrap; gap: 5px; background: #dfe4ea; padding: 10px 10px 0 10px; border-radius: 8px 8px 0 0; }
        .tab-link { padding: 8px 16px; border: none; outline: none; background: #ced6e0; transition: 0.3s; font-weight: bold; cursor: pointer; border-radius: 5px 5px 0 0; font-size: 0.9rem; }
        .tab-link:hover { background: #a4b0be; }
        .tab-link.active { background: #fff; color: #1a2a6c; border-bottom: 3px solid #1e3799; }
        .tab-content { display: none; background: #fff; padding: 30px; border-radius: 0 0 8px 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        .tab-content.active { display: block; }
        .diktat-text { font-size: 1.25rem; line-height: 2.6; letter-spacing: 0.2px; }
        
        /* Implementácia bez medzier */
        .gap-wrap { display: inline; margin: 0; padding: 0; }
        
        select { 
            margin: 0; 
            padding: 0 1px; 
            font-size: 0.85rem; 
            border: 1.5px solid #ccc; 
            border-radius: 2px; 
            background: #fff; 
            cursor: pointer; 
            -webkit-appearance: none; 
            -moz-appearance: none; 
            appearance: none; 
            min-width: 20px; 
            text-align: center; 
            font-weight: bold;
            vertical-align: baseline;
            position: relative;
            top: -1px;
        }
        
        select:focus { border-color: #1e3799; outline: none; }
        select.wrong { background-color: #fab1a0; border-color: #ff7675; color: #d63031; }
        select.correct { background-color: #55efc4; border-color: #00b894; color: #006266; }
        
        .feedback { color: #d63031; font-weight: bold; font-size: 0.85rem; margin: 0 1px; text-decoration: underline; vertical-align: baseline; }
        
        .controls { margin-top: 40px; text-align: center; border-top: 1px solid #eee; padding-top: 20px; }
        button.check-btn { background-color: #1e3799; color: white; border: none; padding: 12px 35px; font-size: 1rem; border-radius: 30px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button.check-btn:hover { background-color: #0c2461; }
    </style>
</head>
<body>

<h1>Interaktívne opakovanie 6. ročníka</h1>

<div class="tabs" id="tab-container"></div>
<div id="content-container"></div>

<script>
    const diktaty = [
        {
            title: "Diktát č. 1",
            text: "Zem po búrke vysychala len pomaly. Zastali sme na brehu krištáľovo čistého jazera. Ostré slnko sa odrážalo na hladine a pálilo až do očí. Vo výhľade nám bránili husté porasty vysokých stromov. Bola by hlúposť pokúsiť sa prebrodiť rieku? Jej prúd by nás strhol priamo do priepasti. Nejedzte surové hríby! Z diaľky sa ozýval hanblivý dievčenský chichot. Šmýkali sme sa na blate dolu kopcom. Po tvári mu stekal prúd sĺz. Rybárov prút sa ani nepohol, ani nemykol. Okolo rozkvitnutej slivky poletovali bzučiace včely a vtáky roztopašne štebotali. Čo iné by mali na práci?"
        },
        {
            title: "Diktát č. 2",
            text: "Mesiac svietil zvysoka. Vplížil sa do obloka, vzápätí sa skryl za oblak. Voda sa rozliala na lúku, začala podmývať spodné vrstvy snehu. V horskej bystrine sa každú chvíľu mihnú pstruhy. Ako by sa dali uloviť? Nebezpečná zmija si oblizla nenásytný jazyk. Dravý potok zmaril jej chabý pokus rýchlo sa dostať na druhú stranu doliny. Zhíkli sme od prekvapenia. Čo nás vyľakalo? Vzápätí sme sa chichotali, až sme sa za bruchá chytali. Ohryzok z jablka ledabolo zahodil do priekopy. To sa nerobí! V neprehľadnej zákrute dostali šmyk. Dokážte mi opak!"
        },
        {
            title: "Diktát č. 3",
            text: "Chcete vidieť prehliadku nášho domu? V tesnej blízkosti kuchyne je moderná obývačka. Televízor visí na stene, aby ho nestrhli detské rúčky. Na bielom koberci vidno zaschnuté škvrny od vína. Zbystrím pozornosť a tuho premýšľam. Ako by sme to mohli zamaskovať? Poradíte mi? Je dobrý nápad nasypať tam soľ? Potrebovala by som presné pokyny. Umy koberec horúcou vodou! Prikry ho suchou handrou! Povysávaj! Len čo však pomyslím na upratovanie, chcela by som zaliezť pod perinu. Oddychovala by som celý deň. Ako ste na tom vy? Pokúsili by ste sa zvíťaziť nad lenivosťou a nezlyhať?"
        },
        {
            title: "Diktát č. 4",
            text: "Môj mladší brat sa veľmi rád lyžuje. Letné prázdniny trávi naša rodina pri mori. Ja by som si radšej vybrala hory a dlhé túry. Moja sestra je zase mestský typ. Miluje hudobné festivaly. Na jednom z nich oslávi aj jej narodeniny. Chcela by som ju prekvapiť. Cestu domov poznáme naspamäť. Trafili by sme aj so zatvorenými očami. Je to však dobrý nápad? V lese sme zistili, že nikto z nás nemá nabitý mobil. Ako by sme si zavolali pomoc? Museli by sme sa spoliehať sami na seba. Boli by sme hrdinovia, ale možno by sme zaplatili vysokú cenu. "
        },
        {
            title: "Diktát č. 5",
            text: "Brečtan je popínavá rastlina, ktorá bude rásť aj v najhlbšom tieni. Oblápa steny a múry ako divoká liana. Beda, ak sa dostane do komína! Pochybujem, že sa mu darí na poli s lúčnymi kvetmi. Potrebuje mnoho vlahy. Bylinky vedia vydržať bez vody aj dlhšie obdobie. Preto sa im hovorí, že sú suchomilné. V záhonoch vyniknú trvalky, ktoré kvitnú až do prvých mrazov. Aké kvety by skrášlili matkin balkón? Zvíťazia plazivé alebo popínavé rastliny? Na výber má neúrekom. Zvolí si odolný typ rastlín, ktoré vydržia tuhé mrazy, dlhé obdobia sucha aj pôdu chudobnú na živiny."
        },
        {
            title: "Diktát č. 6",
            text: "Ostrý vzduch býva najmä ráno. Podchvíľou sa pozerám pod nohy. Cesta je neprehľadná. Omylom som stúpla do tŕnia. Ani som nedýchala. Srdce mi rýchlo bilo. Pomaly som sa odvážila opäť pridať do kroku. Späť som sa už neobzrela. Na konci ulice stojí dom, v ktorom sa cítim bezpečne. Starká mi darovala zlatú retiazku s príveskom. Povedala, že vo svete sa nestratím. Neboj sa! Dôveruj si! To boli jej slová, aby mi dodala odvahu. Zbytočne ma moje strachy oberali o energiu. Cestovala by som aj dnes sama? Na to nemám odpoveď."
        }
    ];

    const targetChars = /[iyíý]/gi;

    function init() {
        const tabContainer = document.getElementById('tab-container');
        const contentContainer = document.getElementById('content-container');

        diktaty.forEach((item, index) => {
            const btn = document.createElement('button');
            btn.className = `tab-link ${index === 0 ? 'active' : ''}`;
            btn.innerText = item.title;
            btn.onclick = () => openTab(index);
            tabContainer.appendChild(btn);

            const div = document.createElement('div');
            div.id = `diktat-${index}`;
            div.className = `tab-content ${index === 0 ? 'active' : ''}`;

            const processedText = item.text.replace(targetChars, (match) => {
                return `<span class="gap-wrap"><select data-correct="${match}"><option value=""></option><option value="i">i</option><option value="í">í</option><option value="y">y</option><option value="ý">ý</option></select></span>`;
            });

            div.innerHTML = `
                <div class="diktat-text">${processedText}</div>
                <div class="controls">
                    <button class="check-btn" onclick="checkAnswers(${index})">Skontrolovať výsledky</button>
                </div>
            `;
            contentContainer.appendChild(div);
        });
    }

    function openTab(index) {
        document.querySelectorAll('.tab-link').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-link')[index].classList.add('active');
        document.getElementById(`diktat-${index}`).classList.add('active');
    }

    function checkAnswers(index) {
        const container = document.getElementById(`diktat-${index}`);
        const selects = container.querySelectorAll('select');

        selects.forEach(select => {
            const originalCorrectChar = select.getAttribute('data-correct');
            const correctCharForCheck = originalCorrectChar.toLowerCase();
            const selectedChar = select.value.toLowerCase();
            
            const parent = select.parentNode;
            const oldFeedback = parent.querySelector('.feedback');
            if (oldFeedback) oldFeedback.remove();

            if (selectedChar === correctCharForCheck && selectedChar !== "") {
                select.className = 'correct';
            } else {
                select.className = 'wrong';
                const feedback = document.createElement('span');
                feedback.className = 'feedback';
                feedback.innerText = originalCorrectChar;
                parent.appendChild(feedback);
            }
        });
    }

    init();
</script>

</body>
</html>
