<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slepá mapa Starovekého Grécka - Finálne úpravy</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #e9ecef;
            margin: 20px;
        }
        .instructions {
            margin-bottom: 20px;
            background: white;
            padding: 15px 30px;
            border-radius: 30px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }
        .container {
            position: relative;
            display: inline-block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 5px solid white;
            border-radius: 4px;
        }
        img {
            display: block;
            max-width: 900px; 
            height: auto;
        }
        .hotspot {
            position: absolute;
            background-color: #222;
            color: #222;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 2px;
            font-weight: bold;
            font-size: 16px;
            text-align: center;
            user-select: none;
            transition: all 0.2s ease;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            transform: translate(-50%, -50%);
        }
        .hotspot:hover {
            background-color: #444;
        }
        .hotspot.revealed {
            background-color: rgba(255, 255, 255, 0.95);
            color: #c0392b;
            border: 2px solid #c0392b;
            box-shadow: 0 0 10px rgba(192, 57, 43, 0.3);
        }
    </style>
</head>
<body>

    <div class="instructions">
        <h2>Slepá mapa: Staroveké Grécko</h2>
        <p>Klikni na čierne polia pre odhalenie názvov.</p>
    </div>

    <div class="container">
        <img src="mapa.jpg" alt="Mapa starovekého Grécka">

        <div class="hotspot" style="top: 12%; left: 30%; padding-right: 50px; min-width: 140px;" onclick="reveal(this)">MACEDÓNIA</div>
        
        <div class="hotspot" style="top: 25%; left: 78%;" onclick="reveal(this)">Trója</div>
        <div class="hotspot" style="top: 28%; left: 30%; min-width: 120px;" onclick="reveal(this)">Olymp</div>
        <div class="hotspot" style="top: 43%; left: 34%;" onclick="reveal(this)">Delfy</div>
        <div class="hotspot" style="top: 48%; left: 48%;" onclick="reveal(this)">Téby</div>
        <div class="hotspot" style="top: 55%; left: 52%;" onclick="reveal(this)">Atény</div>
        <div class="hotspot" style="top: 53%; left: 30%; min-width: 80px;" onclick="reveal(this)">Korint</div>
        <div class="hotspot" style="top: 60%; left: 40%; min-width: 80px;" onclick="reveal(this)">Mykény</div>
        <div class="hotspot" style="top: 69%; left: 31%; min-width: 80px;" onclick="reveal(this)">Sparta</div>
        <div class="hotspot" style="top: 50%; left: 84%;" onclick="reveal(this)">Efez</div>
        <div class="hotspot" style="top: 56%; left: 86%; min-width: 100px;" onclick="reveal(this)">Samos</div>
        <div class="hotspot" style="top: 65%; left: 91%; min-width: 100px;" onclick="reveal(this)">Miletos</div>
        <div class="hotspot" style="top: 79%; left: 91%; min-width: 100px;" onclick="reveal(this)">RODOS</div>
        <div class="hotspot" style="top: 95%; left: 68%; min-width: 100px;" onclick="reveal(this)">KRÉTA</div>
        <div class="hotspot" style="top: 89%; left: 65%; min-width: 100px;" onclick="reveal(this)">Knóssos</div>
        <div class="hotspot" style="top: 97%; left: 52%; min-width: 100px;" onclick="reveal(this)">Faistos</div>
    </div>

    <script>
        function reveal(element) {
            element.classList.toggle('revealed');
        }
    </script>
</body>
</html>
